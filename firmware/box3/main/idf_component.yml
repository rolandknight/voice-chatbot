# Managed components fetched by the ESP-IDF component manager.
# Versions are pinned to known-good combinations against ESP-IDF v5.1.x.
#
# If the build fails on a missing API symbol, bump the relevant version and
# update the corresponding C source.

dependencies:
  idf:
    version: ">=5.1.0"

  # Espressif Board Support Package — gives us a one-shot init for the
  # Box-3's display, touch, ES7210 mic codec, and ES8311 speaker codec.
  espressif/esp-bsp:
    version: "^1.4.0"
    public_dependencies: true

  # AFE (audio front-end): beamforming + AEC + NS + AGC. Built without WakeNet.
  espressif/esp-sr:
    version: "^1.4.0"

  # LCD + touch drivers (pulled transitively by esp-bsp but pin explicitly).
  espressif/esp_lcd_touch_tt21100:
    version: "^1.1.0"

  # LVGL for the UI.
  lvgl/lvgl:
    version: "~8.3.0"

  # WebRTC stack. esp-webrtc-solution is published as a managed component;
  # if the registry version lags, switch to a git submodule under components/.
  espressif/esp_webrtc:
    version: "^1.0.0"

  # TFLite Micro runtime for microWakeWord inference.
  espressif/esp-tflite-micro:
    version: "^1.3.0"

  # JSON parser used by webrtc_client.c for SDP and DataChannel messages.
  espressif/cjson:
    version: "^1.7.0"
