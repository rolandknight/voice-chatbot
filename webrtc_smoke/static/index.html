<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>voice-chatbot · WebRTC smoke test</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111418;
      --panel: #1b1f24;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --good: #3fb950;
      --bad: #f85149;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 32px 16px;
    }
    main {
      width: 100%;
      max-width: 720px;
    }
    h1 { margin: 0 0 4px; font-size: 18px; }
    p.lede { margin: 0 0 24px; color: var(--muted); }
    .panel {
      background: var(--panel);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    button {
      background: var(--accent);
      color: #0d1117;
      border: 0;
      border-radius: 6px;
      padding: 8px 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button[disabled] { opacity: 0.4; cursor: not-allowed; }
    button.secondary { background: #30363d; color: var(--text); }
    .status { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 13px; }
    .status .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: #30363d;
      margin-right: 8px;
    }
    .status .pill.ok { background: rgba(63, 185, 80, 0.25); color: var(--good); }
    .status .pill.err { background: rgba(248, 81, 73, 0.25); color: var(--bad); }
    .controls input[type="text"] {
      background: #0d1117;
      border: 1px solid #30363d;
      color: var(--text);
      border-radius: 6px;
      padding: 6px 10px;
      flex: 1;
      font: inherit;
    }
    pre.log {
      background: #0d1117;
      border-radius: 6px;
      padding: 12px;
      margin: 0;
      height: 280px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font: 12px/1.5 ui-monospace, SFMono-Regular, monospace;
    }
    pre.log .ts { color: var(--muted); }
    pre.log .send { color: var(--accent); }
    pre.log .recv { color: var(--good); }
    pre.log .warn { color: #d29922; }
    pre.log .err { color: var(--bad); }
    audio { display: block; width: 100%; margin-top: 8px; }
  </style>
</head>
<body>
  <main>
    <h1>voice-chatbot · WebRTC smoke test</h1>
    <p class="lede">
      Browser ↔ aiortc loopback. Mic audio is relayed back to the browser
      speakers; the <code>control</code> DataChannel echoes JSON messages.
    </p>

    <div class="panel">
      <div class="row">
        <button id="connect">Talk</button>
        <button id="disconnect" class="secondary" disabled>Stop</button>
        <span class="status">
          <span id="pill-pc" class="pill">pc: new</span>
          <span id="pill-ice" class="pill">ice: new</span>
          <span id="pill-dc" class="pill">dc: closed</span>
        </span>
      </div>
      <audio id="remote" autoplay playsinline></audio>
    </div>

    <div class="panel controls">
      <div class="row">
        <input id="msg" type="text" placeholder='{"type":"hello","kind":"simple","capabilities":["audio"]}' />
        <button id="send" class="secondary" disabled>Send</button>
      </div>
    </div>

    <div class="panel">
      <pre id="log" class="log"></pre>
    </div>
  </main>

  <script src="/client.js"></script>
</body>
</html>
